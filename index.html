<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tube Mini</title>
    <style>
        body {
            margin: 0; background: #0f0f0f; color: white;
            font-family: Arial, sans-serif; display: flex; justify-content: center;
        }
        /* Tüm ekranı kaplamaması için genişlik sınırı */
        .app-container {
            width: 100%; max-width: 450px;
            background: #000; min-height: 100vh;
            border-left: 1px solid #333; border-right: 1px solid #333;
        }
        header {
            padding: 15px; display: flex; align-items: center;
            position: sticky; top: 0; background: #000; z-index: 10;
        }
        .logo { color: #ff0000; font-weight: bold; font-size: 24px; letter-spacing: -1px; }
        .logo span { color: white; }

        .video-list { padding: 10px; }
        .video-card { margin-bottom: 20px; cursor: pointer; }
        
        /* Görsel Alanı */
        .thumb {
            width: 100%; aspect-ratio: 16/9; border-radius: 12px;
            background-size: cover; background-position: center;
            position: relative; border: 1px solid #222;
        }
        .time {
            position: absolute; bottom: 8px; right: 8px;
            background: rgba(0,0,0,0.8); padding: 2px 6px;
            border-radius: 4px; font-size: 12px;
        }

        .meta { display: flex; margin-top: 10px; gap: 12px; }
        .avatar { width: 36px; height: 36px; border-radius: 50%; background: #444; }
        .info h4 { margin: 0; font-size: 14px; line-height: 1.2; color: #efefef; }
        .info p { margin: 4px 0; font-size: 12px; color: #aaa; }
    </style>
</head>
<body>

<div class="app-container">
    <header><div class="logo">Tube<span>Mini</span></div></header>

    <div class="video-list" id="feed">
        <!-- Videolar JavaScript ile dolacak -->
    </div>
</div>

<script>
    const videos = [
        { title: "MusaMert231: Donut SMP'de Büyük Baskın!", user: "MusaMert231", views: "1.2M", time: "10:05", img: "https://picsum.photos/seed/mc1/400/225", color: "gold" },
        { title: "Pokemon06 ile Blox Fruits Taktikleri", user: "Pokemon06", views: "850B", time: "15:20", img: "https://picsum.photos/seed/roblox1/400/225", color: "cyan" },
        { title: "FCO0: Modern Redstone Şehri Yapımı", user: "FCO0", views: "500B", time: "22:45", img: "https://picsum.photos/seed/mc2/400/225", color: "orange" },
        { title: "Teknofest Projemiz: Akıllı Hasat Testi", user: "TeknoTeam", views: "100B", time: "05:30", img: "https://picsum.photos/seed/tech1/400/225", color: "green" },
        { title: "Minecraft 100 Gün Survival - Hardcore", user: "GamerTR", views: "2M", time: "45:00", img: "https://picsum.photos/seed/mc3/400/225", color: "red" },
        { title: "Brawl Stars Yeni Karakter İnceleme", user: "StarGamer", views: "300B", time: "08:15", img: "https://picsum.photos/seed/bs1/400/225", color: "purple" },
        { title: "Lunar Research Oyunu Geliştirme Günlüğü", user: "DevLog", views: "50B", time: "12:10", img: "https://picsum.photos/seed/space1/400/225", color: "blue" },
        { title: "Dünyanın En Güçlü Minecraft Drilli!", user: "ItemMaster", views: "900B", time: "06:40", img: "https://picsum.photos/seed/mc4/400/225", color: "yellow" },
        { title: "Discord Bot Yapımı 2026 Rehberi", user: "CodeHero", views: "150B", time: "18:25", img: "https://picsum.photos/seed/code1/400/225", color: "silver" },
        { title: "Gizemli Server: Donut SMP Kuralları", user: "AdminX", views: "250B", time: "09:50", img: "https://picsum.photos/seed/mc5/400/225", color: "pink" }
    ];

    const feed = document.getElementById('feed');

    videos.forEach(v => {
        feed.innerHTML += `
            <div class="video-card">
                <div class="thumb" style="background-image: url('${v.img}')">
                    <div class="time">${v.time}</div>
                </div>
                <div class="meta">
                    <div class="avatar" style="background: ${v.color}"></div>
                    <div class="info">
                        <h4>${v.title}</h4>
                        <p>${v.user} • ${v.views} izlenme</p>
                    </div>
                </div>
            </div>
        `;
    });
</script>

</body>
</html>
